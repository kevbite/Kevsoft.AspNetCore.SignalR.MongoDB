name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, test, and pack
    uses: ./.github/workflows/build-test-pack.yml
    with:
      package_version: 0.1.0-ci.${{ github.run_number }}.${{ github.run_attempt }}
